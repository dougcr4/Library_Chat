openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: 3D Designer API - Garden Furniture & Garden Buildings
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: furniture
    description: Garden Furniture design operations
  - name: buildings
    description: Garden Buildings (SIPs) design operations
  - name: settings
    description: Application settings
  - name: projects
    description: Project management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get application settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update application settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Settings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /furniture/styles:
    get:
      operationId: getFurnitureStyles
      tags: [furniture]
      summary: Get list of garden furniture styles
      responses:
        "200":
          description: List of styles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FurnitureStyleList"

  /furniture/items:
    get:
      operationId: getFurnitureItems
      tags: [furniture]
      summary: Get list of garden furniture items
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FurnitureItemList"

  /furniture/generate:
    post:
      operationId: generateFurniture3D
      tags: [furniture]
      summary: Generate 3D model for garden furniture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FurnitureGenerateRequest"
      responses:
        "200":
          description: Generation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateResponse"

  /buildings/catalogue:
    get:
      operationId: getBuildingsCatalogue
      tags: [buildings]
      summary: Get full SIPs buildings catalogue (designs, sizes, fitout options)
      responses:
        "200":
          description: Full buildings catalogue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildingsCatalogue"

  /buildings/generate:
    post:
      operationId: generateBuilding3D
      tags: [buildings]
      summary: Generate 3D model for garden building
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildingGenerateRequest"
      responses:
        "200":
          description: Generation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all saved projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectList"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Settings:
      type: object
      properties:
        ollamaUrl:
          type: string
        ollamaModel:
          type: string
        openWebUiUrl:
          type: string
        cadqueryViewerUrl:
          type: string
        jupyterLabUrl:
          type: string
        sharedDesignsPath:
          type: string
      required:
        - ollamaUrl
        - ollamaModel
        - openWebUiUrl
        - cadqueryViewerUrl
        - jupyterLabUrl
        - sharedDesignsPath

    FurnitureStyle:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
      required:
        - id
        - name
        - description

    FurnitureStyleList:
      type: object
      properties:
        styles:
          type: array
          items:
            $ref: "#/components/schemas/FurnitureStyle"
      required:
        - styles

    FurnitureItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
      required:
        - id
        - name
        - description
        - category

    FurnitureItemList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FurnitureItem"
      required:
        - items

    FurnitureGenerateRequest:
      type: object
      properties:
        styleId:
          type: string
          nullable: true
        itemId:
          type: string
          nullable: true
        prompt:
          type: string
        projectName:
          type: string
          nullable: true
      required:
        - prompt

    BuildingsCatalogue:
      type: object
      properties:
        designs:
          type: array
          items:
            $ref: "#/components/schemas/BuildingDesign"
        sizes:
          type: array
          items:
            $ref: "#/components/schemas/BuildingSize"
        sipThicknesses:
          type: array
          items:
            $ref: "#/components/schemas/SipThickness"
        timberSizes:
          type: array
          items:
            $ref: "#/components/schemas/TimberSize"
        standardLengths:
          type: array
          items:
            type: integer
        fitoutSections:
          type: array
          items:
            $ref: "#/components/schemas/FitoutSection"
      required:
        - designs
        - sizes
        - sipThicknesses
        - timberSizes
        - standardLengths
        - fitoutSections

    BuildingDesign:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        description:
          type: string
      required:
        - id
        - code
        - name
        - description

    BuildingSize:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        label:
          type: string
        approxWidth:
          type: integer
          nullable: true
        approxLength:
          type: integer
          nullable: true
        footprintM2:
          type: number
          nullable: true
        planningFlag:
          type: boolean
        buildingRegsFlag:
          type: boolean
        note:
          type: string
      required:
        - id
        - name
        - label
        - planningFlag
        - buildingRegsFlag
        - note

    SipThickness:
      type: object
      properties:
        id:
          type: string
        totalMm:
          type: integer
        osbMm:
          type: integer
        epsMm:
          type: integer
        weightKg:
          type: number
        uValue:
          type: number
        label:
          type: string
      required:
        - id
        - totalMm
        - osbMm
        - epsMm
        - weightKg
        - uValue
        - label

    TimberSize:
      type: object
      properties:
        id:
          type: string
        species:
          type: string
        widthMm:
          type: integer
        thicknessMm:
          type: integer
        csaMm2:
          type: integer
        label:
          type: string
      required:
        - id
        - species
        - widthMm
        - thicknessMm
        - csaMm2
        - label

    FitoutSection:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/FitoutOption"
      required:
        - id
        - code
        - name
        - options

    FitoutOption:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        products:
          type: array
          items:
            $ref: "#/components/schemas/FitoutProduct"
      required:
        - id
        - code
        - name
        - products

    FitoutProduct:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        cribbCodes:
          type: array
          items:
            $ref: "#/components/schemas/CribbCode"
      required:
        - id
        - code
        - name
        - cribbCodes

    CribbCode:
      type: object
      properties:
        index:
          type: integer
        label:
          type: string
        code:
          type: string
        children:
          type: array
          description: Optional nested cascade. Present when this node is a branch (e.g. Substrate → Brand → Colour).
          items:
            $ref: "#/components/schemas/CribbCode"
      required:
        - index
        - label
        - code

    BuildingGenerateRequest:
      type: object
      properties:
        designId:
          type: string
        sizeId:
          type: string
        sipThicknessId:
          type: string
        fitoutSelections:
          type: array
          items:
            $ref: "#/components/schemas/FitoutSelection"
        additionalNotes:
          type: string
          nullable: true
        projectName:
          type: string
          nullable: true
      required:
        - designId
        - sizeId
        - sipThicknessId
        - fitoutSelections

    FitoutSelection:
      type: object
      properties:
        sectionId:
          type: string
        optionId:
          type: string
        productId:
          type: string
        cribbCode:
          type: string
          nullable: true
      required:
        - sectionId
        - optionId
        - productId

    GenerateResponse:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [queued, processing, rendering, complete, error]
        stage:
          type: string
        modelOutput:
          type: string
          nullable: true
        estimatedSeconds:
          type: integer
          nullable: true
        error:
          type: string
          nullable: true
      required:
        - jobId
        - status
        - stage

    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [furniture, building]
        styleId:
          type: string
          nullable: true
        itemId:
          type: string
          nullable: true
        designId:
          type: string
          nullable: true
        sizeId:
          type: string
          nullable: true
        prompt:
          type: string
        status:
          type: string
          enum: [queued, processing, rendering, complete, error]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - type
        - prompt
        - status
        - createdAt
        - updatedAt

    CreateProjectRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [furniture, building]
        styleId:
          type: string
          nullable: true
        itemId:
          type: string
          nullable: true
        designId:
          type: string
          nullable: true
        sizeId:
          type: string
          nullable: true
        prompt:
          type: string
      required:
        - name
        - type
        - prompt

    ProjectList:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
      required:
        - projects

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
