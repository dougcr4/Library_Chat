kind = "web"
previewPath = "/"
title = "3D Designer"
version = "1.0.0"
id = "artifacts/3d-designer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24976
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/3d-designer run dev"

[services.env]
PORT = "24976"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/3d-designer", "run", "build"]
publicDir = "artifacts/3d-designer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
